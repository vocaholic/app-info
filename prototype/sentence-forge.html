<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sentence Forge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#F7F8F6; --card:#FFFFFF; --line:#E3E7E2; --line2:#CDD4CC;
  --ink:#1A211C; --ink2:#5C665E; --ink3:#9AA39B;
  --grass:#2F7D52; --grassbg:#E7F2EA; --grassline:#BCDCC8;
  --rust:#B4452F; --rustbg:#F8E7E2; --rustline:#E8C4B9;
  --gold:#9A7A1E; --goldbg:#F6EFD8; --plum:#5A4A7A;
  --disp:'Spectral',Georgia,serif; --sans:'Inter','Segoe UI',sans-serif; --mono:'JetBrains Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper); color:var(--ink); font-family:var(--sans); font-size:16px; line-height:1.55; min-height:100vh; -webkit-font-smoothing:antialiased;}
.wrap{max-width:680px; margin:0 auto; padding:30px 18px 90px;}

.topbar{display:flex; align-items:center; gap:12px; margin-bottom:14px;}
.topbar-title{font-family:var(--disp); font-weight:600; font-size:1.35rem;}
.topbar-title em{font-style:italic; color:var(--grass);}
.topbar-progress{font-family:var(--mono); font-size:0.74rem; color:var(--ink3); margin-left:auto; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}

header .eyebrow{font-family:var(--mono); font-size:0.72rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--grass); margin-bottom:8px;}
header h1{font-family:var(--disp); font-weight:600; font-size:2.1rem; line-height:1.05; letter-spacing:-0.01em;}
header h1 em{font-style:italic; color:var(--grass);}
.sub{color:var(--ink2); font-size:0.96rem; margin-top:8px; max-width:52ch;}

/* start controls */
.controls{display:flex; flex-direction:column; gap:12px; margin-top:22px;}
.field{display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
.field-label{font-family:var(--mono); font-size:0.7rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink3); flex:0 0 64px;}
#emailin{flex:1; min-width:200px; font-family:var(--mono); font-size:0.85rem; padding:9px 12px; border:1.5px solid var(--line2); border-radius:9px; background:#fff;}
#emailin:focus{outline:none; border-color:var(--grass);}
#model-sel{font-family:var(--sans); font-size:0.9rem; font-weight:500; color:var(--ink); background:var(--card); border:1.5px solid var(--line2); border-radius:9px; padding:8px 11px; cursor:pointer;}
#model-sel:focus{outline:none; border-color:var(--grass);}

.card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:22px; box-shadow:0 1px 2px rgba(20,30,22,0.03);}
.counter{font-family:var(--mono); font-size:0.78rem; color:var(--ink3); margin:22px 0 10px;}

.vn-label{font-family:var(--mono); font-size:0.7rem; letter-spacing:0.14em; text-transform:uppercase; color:var(--ink3); margin-bottom:8px;}
.vn{font-family:var(--disp); font-size:1.5rem; line-height:1.3; color:var(--ink); margin-bottom:18px;}
textarea{width:100%; font-family:var(--sans); font-size:1.05rem; line-height:1.5; color:var(--ink); background:var(--paper); border:1.5px solid var(--line2); border-radius:11px; padding:13px 15px; resize:vertical; min-height:74px; transition:border-color .15s;}
textarea:focus{outline:none; border-color:var(--grass); background:#fff;}

.row{display:flex; gap:10px; flex-wrap:wrap; align-items:center; margin-top:14px;}
.btn{font-family:var(--sans); font-weight:600; font-size:0.95rem; border:1.5px solid var(--ink); background:var(--ink); color:#fff; border-radius:10px; padding:10px 20px; cursor:pointer; transition:transform .05s, opacity .15s;}
.btn:hover{opacity:0.9;} .btn:active{transform:translateY(1px);} .btn:disabled{opacity:0.4; cursor:default;}
.btn.ghost{background:transparent; color:var(--ink); border-color:var(--line2);}

.checking{display:flex; align-items:center; gap:10px; color:var(--ink2); font-size:0.95rem; padding:8px 0;}
.spinner{width:16px; height:16px; border:2px solid var(--grassline); border-top-color:var(--grass); border-radius:50%; animation:spin .7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.err{margin-top:16px; padding:13px 15px; background:var(--rustbg); border:1px solid var(--rustline); border-radius:11px; color:var(--rust); font-size:0.9rem;}

/* results group */
.group{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:22px; box-shadow:0 1px 2px rgba(20,30,22,0.03);}
.group-head{margin-bottom:2px;}
.group-title{font-family:var(--disp); font-size:1.15rem; font-weight:600;}
.group-note{font-size:0.86rem; color:var(--ink2); margin-top:4px;}
.group-item{margin-top:14px; padding:16px 16px 18px; border:1px solid var(--line2); border-radius:12px; background:var(--paper);}

/* vertical comparison */
.vstack{display:flex; flex-direction:column; gap:9px; margin-top:12px;}
.vrow{display:flex; gap:10px; align-items:flex-start;}
.vlbl{flex:0 0 108px; font-family:var(--mono); font-size:0.63rem; text-transform:uppercase; letter-spacing:0.05em; color:var(--ink3); line-height:1.5; padding-top:1px;}
.vrow.best .vlbl{color:var(--grass);}
.vtxt{flex:1; min-width:0; font-size:0.96rem; color:var(--ink); line-height:1.5;}
.diff-ins{background:var(--grassbg); border-bottom:2px solid var(--grass); border-radius:3px; padding:0 3px;}

/* skills */
.iskills{margin-top:14px; padding-top:12px; border-top:1px dashed var(--line);}
.iskills-h{font-family:var(--mono); font-size:0.64rem; text-transform:uppercase; letter-spacing:0.06em; color:var(--ink3); margin-bottom:8px;}
.iskill{display:flex; align-items:center; gap:8px; padding:4px 0; font-size:0.9rem;}
.iskill-mark{flex:none; width:16px; text-align:center; font-weight:800;}
.iskill.miss .iskill-mark{color:var(--rust);}
.iskill.altawk .iskill-mark{color:var(--gold);}
.iskill-desc{flex:1; min-width:0; color:var(--ink);}
.tag{font-family:var(--mono); font-size:0.62rem; letter-spacing:0.08em; text-transform:uppercase; padding:2px 7px; border-radius:5px;}
.tag.grammar{background:var(--goldbg); color:var(--gold);}
.tag.vocabulary{background:#EDE9F4; color:var(--plum);}
.play-pron{flex:none; border:none; background:var(--grass); color:#fff; cursor:pointer; font-size:0.8rem; line-height:1; padding:4px 9px; border-radius:7px; box-shadow:0 1px 2px rgba(20,30,22,0.15);}
.play-pron:hover{background:#2A6E49;} .play-pron:active{transform:translateY(1px);}

footer{margin-top:40px; font-size:0.8rem; color:var(--ink3); line-height:1.6;}
</style>
</head>
<body>
<div class="wrap">

<div class="topbar">
  <span class="topbar-title">Sentence <em>Forge</em></span>
  <span class="topbar-progress" id="topProgress"></span>
</div>

<div id="setup">
  <header>
    <div class="eyebrow">VN → EN · luyện dịch</div>
    <h1>Sentence <em>Forge</em></h1>
    <p class="sub">Dịch câu tiếng Việt sang tiếng Anh. AI sẽ sửa câu của bạn, đưa câu mẫu, và chỉ ra những kỹ năng còn thiếu.</p>
  </header>
  <div class="controls">
    <div class="field">
      <span class="field-label">Email</span>
      <input type="email" id="emailin" placeholder="you@example.com" autocomplete="email">
    </div>
    <div class="field">
      <span class="field-label">Mô hình</span>
      <select id="model-sel"></select>
    </div>
    <div class="row">
      <button class="btn" id="startbtn">Bắt đầu →</button>
    </div>
  </div>
</div>

<div id="stage"></div>

<footer>Bản thử nghiệm · Dịch câu · AI đánh dấu ✗ kỹ năng còn thiếu và ≈ kỹ năng tạm hiểu nhưng chưa hay.</footer>
</div>

<script>
"use strict";

/* ===================== BACKEND ===================== */
const BACKEND = "https://engine-ca.blueriver-5203a765.eastus.azurecontainerapps.io";
/* =================================================== */

const $ = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

/* models — default Sonnet */
const MODELS = [
  { id:"claude-haiku-4-5-20251001", label:"Haiku 4.5 — nhanh" },
  { id:"claude-sonnet-4-6",         label:"Sonnet 4.6 — cân bằng" },
  { id:"claude-opus-4-8",           label:"Opus 4.8 — mạnh nhất" }
];
let currentModel = "claude-sonnet-4-6";   // default Sonnet

function renderModelPicker(){
  const sel = $("model-sel");
  sel.innerHTML = MODELS.map(m=>`<option value="${m.id}"${m.id===currentModel?" selected":""}>${esc(m.label)}</option>`).join("");
  sel.onchange = ()=>{ currentModel = sel.value; };
}

/* ---------- BE calls ---------- */
async function apiPost(path, body){
  const resp = await fetch(BACKEND + path, { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify(body) });
  let data = null;
  try{ data = await resp.json(); }catch(e){}
  if(!resp.ok || !data || data.success === false){
    throw new Error((data && data.message) ? data.message : ("HTTP "+resp.status));
  }
  return data.data;   // { code, data, success, ... }
}
const getSentences  = email   => apiPost("/api/speak/get-sentence", { email });      // -> {sen_data, sessionid}
const evaluateOne   = payload => apiPost("/api/speak/evaluate", payload);             // -> {refined, gaps, sessionid}

/* ===================== state ===================== */
const S = { email:"", model:"", sessionid:null, batch:[], pos:0, pending:[] };
/* batch[i] = { vn_sen, sentenceid, best_refined_sen, first:{text,refined,gaps}|null } */

async function startSession(){
  const email = ($("emailin").value || "").trim();
  if(!email){ $("emailin").focus(); return; }
  S.email = email;
  try{ localStorage.setItem("sf_email", email); }catch(e){}
  $("setup").style.display = "none";
  $("stage").innerHTML = `<div class="card"><div class="checking"><div class="spinner"></div>Đang tải câu…</div></div>`;
  let res;
  try{
    res = await getSentences(email);
  }catch(e){
    $("stage").innerHTML = `<div class="card"><div class="err">Không tải được câu: ${esc(e.message)}.</div>
      <div class="row"><button class="btn" id="retry">Thử lại</button></div></div>`;
    $("retry").onclick = ()=>{ $("setup").style.display=""; $("stage").innerHTML=""; };
    return;
  }
  S.sessionid = res.sessionid;
  S.batch = (res.sen_data || []).map(s => ({
    vn_sen: s.vn_sen,
    sentenceid: s.sentenceid,
    best_refined_sen: s.best_refined_sen || null,
    first: null
  }));
  S.pos = 0; S.pending = [];
  if(!S.batch.length){ $("stage").innerHTML = `<div class="card"><div class="err">Không có câu nào cho email này.</div></div>`; return; }
  renderTranslate();
}

function setProgress(txt){ $("topProgress").textContent = txt; }

/* ---------------- translate one sentence at a time ---------------- */
function renderTranslate(){
  const rec = S.batch[S.pos];
  const last = S.pos >= S.batch.length-1;
  setProgress(`Câu ${S.pos+1} / ${S.batch.length}`);
  $("stage").innerHTML = `
    <div class="counter">Dịch sang tiếng Anh · câu ${S.pos+1} / ${S.batch.length}</div>
    <div class="card">
      <div class="vn-label">Dịch câu này</div>
      <div class="vn">${esc(rec.vn_sen)}</div>
      <textarea id="ans" placeholder="Nhập bản dịch tiếng Anh…" autocomplete="off" autocapitalize="off" spellcheck="false"></textarea>
      <div class="row"><button class="btn" id="go">${last ? "Xem kết quả →" : "Câu tiếp →"}</button></div>
    </div>`;
  const ta = $("ans"); ta.focus();
  ta.addEventListener("keydown", e=>{ if(e.key==="Enter" && (e.metaKey||e.ctrlKey)){ e.preventDefault(); submit(); } });
  $("go").onclick = submit;
}

function submit(){
  const rec = S.batch[S.pos];
  const ans = $("ans").value.trim();
  if(!ans){ $("ans").focus(); return; }
  const last = S.pos >= S.batch.length-1;
  // fire grading in the background; advance immediately (deferred grading)
  rec.first = { text:ans, refined:null, gaps:[], pending:true };
  const p = evaluateOne({
    email: S.email,
    sentenceid: rec.sentenceid,
    vn_sen: rec.vn_sen,
    en_sen_learner_input: ans,
    claude_model: currentModel,
    sessionid: S.sessionid
  }).then(r=>{ rec.first = { text:ans, refined:r.refined, gaps:r.gaps || [] }; })
    .catch(e=>{ rec.first = { text:ans, refined:null, gaps:[], error:e.message }; });
  S.pending.push(p);
  if(last) finishBatch();
  else { S.pos++; renderTranslate(); }
}

async function finishBatch(){
  setProgress("Đang chấm…");
  $("stage").innerHTML = `<div class="card"><div class="checking"><div class="spinner"></div>Đang chấm các câu…</div></div>`;
  try{ await Promise.all(S.pending); }catch(e){}
  S.pending = [];
  renderSummary();
}

/* ---------------- results summary ---------------- */
function renderSummary(){
  setProgress(`Kết quả · ${S.batch.length} câu`);
  const items = S.batch.map((rec,i)=>`<div class="group-item">
    <div class="vn-label">Câu ${i+1}</div>
    <div class="vn" style="font-size:1.1rem">${esc(rec.vn_sen)}</div>
    ${comparisonRows(rec)}
    ${skillsHtml(rec)}
  </div>`).join("");
  $("stage").innerHTML = `<div class="counter">Kết quả</div>
    <div class="group">
      <div class="group-head"><div class="group-title">Kết quả</div></div>
      ${items}
    </div>
    <div class="row" style="margin-top:18px"><button class="btn" id="again">Câu mới →</button></div>`;
  $("again").onclick = startSession;
}

/* your sentence, minimal correction (diff), model sentence (diff). No score. */
function comparisonRows(rec){
  const f = rec.first || {};
  const base = f.text || "";
  const rows = [];
  rows.push(`<div class="vrow"><span class="vlbl">Bạn dịch</span><span class="vtxt">${base ? esc(base) : "—"}</span></div>`);
  if(f.refined) rows.push(`<div class="vrow"><span class="vlbl">Sửa tối thiểu</span><span class="vtxt">${refinedDiff(base, f.refined)}</span></div>`);
  if(rec.best_refined_sen) rows.push(`<div class="vrow best"><span class="vlbl">Câu mẫu</span><span class="vtxt">${refinedDiff(base, rec.best_refined_sen)}</span></div>`);
  if(f.error) rows.push(`<div class="vrow"><span class="vlbl">Lỗi</span><span class="vtxt" style="color:var(--rust)">${esc(f.error)}</span></div>`);
  return `<div class="vstack">${rows.join("")}</div>`;
}

/* skills come straight from the judge's gaps, split into missed and awkward */
function skillsHtml(rec){
  const gaps = (rec.first && rec.first.gaps) || [];
  const miss = gaps.filter(g => g.status === "miss");
  const awk  = gaps.filter(g => g.status === "alt_awkward");
  if(!miss.length && !awk.length) return "";

  const row = (g, mark, cls)=>{
    const isVocab = g.skill_type==="vocabulary";
    const tag = isVocab ? `<span class="tag vocabulary">từ vựng</span>` : `<span class="tag grammar">ngữ pháp</span>`;
    const enWord = isVocab ? String(g.skill_description||"").split(":")[0].trim() : "";
    const play = (isVocab && enWord) ? `<button class="play-pron" data-word="${esc(enWord)}" title="Phát âm: ${esc(enWord)}" aria-label="Phát âm">🔊</button>` : "";
    return `<div class="iskill ${cls}"><span class="iskill-mark">${mark}</span>${tag}<span class="iskill-desc">${esc(g.skill_description)}</span>${play}</div>`;
  };
  let html = "";
  if(miss.length) html += `<div class="iskills-h">Kĩ năng còn thiếu</div>` + miss.map(g=>row(g,"✗","miss")).join("");
  if(awk.length)  html += `<div class="iskills-h"${miss.length?' style="margin-top:14px"':''}>Từ vựng đúng hơn</div>` + awk.map(g=>row(g,"≈","altawk")).join("");
  return `<div class="iskills">${html}</div>`;
}

/* ---------------- word-level diff ---------------- */
function wordDiff(aStr, bStr){
  const nrm = w=>w.toLowerCase().replace(/[.,!?;:'"]/g,"");
  const a=(aStr||"").split(/\s+/).filter(Boolean), b=(bStr||"").split(/\s+/).filter(Boolean);
  const n=a.length, m=b.length;
  const dp=Array.from({length:n+1}, ()=>new Array(m+1).fill(0));
  for(let i=n-1;i>=0;i--) for(let j=m-1;j>=0;j--){
    dp[i][j] = (nrm(a[i])===nrm(b[j])) ? dp[i+1][j+1]+1 : Math.max(dp[i+1][j], dp[i][j+1]);
  }
  const ops=[]; let i=0,j=0;
  while(i<n && j<m){
    if(nrm(a[i])===nrm(b[j])){ ops.push({t:"eq", w:b[j]}); i++; j++; }
    else if(dp[i+1][j] >= dp[i][j+1]){ ops.push({t:"del", w:a[i]}); i++; }
    else { ops.push({t:"ins", w:b[j]}); j++; }
  }
  while(i<n){ ops.push({t:"del", w:a[i]}); i++; }
  while(j<m){ ops.push({t:"ins", w:b[j]}); j++; }
  return ops;
}
/* refined sentence with inserted/changed words (vs base) highlighted */
function refinedDiff(base, refined){
  if(!refined) return "";
  return wordDiff(base, refined).filter(o=>o.t!=="del")
    .map(o=> o.t==="ins" ? `<span class="diff-ins">${esc(o.w)}</span>` : esc(o.w)).join(" ");
}

/* ---------------- pronunciation ---------------- */
function speakWord(w){
  if(!w || !window.speechSynthesis) return;
  try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(w); u.lang="en-US"; u.rate=0.9; speechSynthesis.speak(u); }catch(e){}
}

/* ---------------- boot ---------------- */
renderModelPicker();
try{ $("emailin").value = localStorage.getItem("sf_email") || ""; }catch(e){}
$("startbtn").onclick = startSession;
$("emailin").addEventListener("keydown", e=>{ if(e.key==="Enter"){ e.preventDefault(); startSession(); } });
document.addEventListener("click", e=>{ const b=e.target.closest(".play-pron"); if(b) speakWord(b.dataset.word); });
</script>
</body>
</html>
